<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign in · Saltmarsh</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="brand" style="margin-bottom: 1.25rem;">
      <div class="brand-mark">S</div>
      <div>
        <h1 style="font-size:1.35rem;">Saltmarsh Harbor</h1>
        <p>Operations platform</p>
      </div>
    </div>
    <p class="subtitle">Sign in to manage berths, vessels, work orders, and invoices.</p>

    <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>
    <div th:if="${success}" class="flash flash-success" th:text="${success}"></div>

    <form th:action="@{/login}" method="post" class="stack">
      <div>
        <label for="username">Email</label>
        <input id="username" name="username" type="email" required autofocus placeholder="you@example.com"/>
      </div>
      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required placeholder="••••••••"/>
      </div>
      <button class="btn" type="submit" style="width:100%; margin-top:0.5rem;">Sign in</button>
    </form>

    <div class="demo-accounts" th:if="${showDemoAccounts}">
      <p><strong>Local demo accounts</strong> (password for all: <code>password</code>)</p>
      <p><code>harbor@saltmarsh.harbor</code> — Harbormaster</p>
      <p><code>staff@saltmarsh.harbor</code> — Staff</p>
      <p><code>alex@example.com</code> — Boater</p>
      <p><code>admin@saltmarsh.harbor</code> — Admin</p>
    </div>
  </div>
</div>
</body>
</html>
