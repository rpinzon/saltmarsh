<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout (title, content)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:replace="${title}">Saltmarsh</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">S</div>
      <div>
        <h1>Saltmarsh</h1>
        <p>Marina Operations</p>
      </div>
    </div>
    <nav class="nav">
      <a th:href="@{/}">Dashboard</a>
      <a th:href="@{/berths}">Berths</a>
      <a th:href="@{/vessels}">Vessels</a>
      <a th:href="@{/reservations}">Reservations</a>
      <a th:href="@{/waitlist}">Waitlist</a>
      <a th:href="@{/work-orders}">Work Orders</a>
      <a th:href="@{/invoices}">Invoices</a>
    </nav>
    <div class="user-chip" sec:authorize="isAuthenticated()">
      <strong th:text="${currentUser != null ? currentUser.fullName : 'User'}">User</strong>
      <span th:text="${currentRole}">ROLE</span>
      <form th:action="@{/logout}" method="post">
        <button class="btn btn-secondary btn-sm" type="submit">Sign out</button>
      </form>
    </div>
  </aside>
  <main class="main">
    <div th:if="${success}" class="flash flash-success" th:text="${success}"></div>
    <div th:if="${error}" class="flash flash-error" th:text="${error}"></div>
    <div th:replace="${content}">Content</div>
  </main>
</div>
</body>
</html>
