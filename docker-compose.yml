services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saltmarsh
      POSTGRES_USER: saltmarsh
      POSTGRES_PASSWORD: saltmarsh
    ports:
      - "5432:5432"
    volumes:
      - saltmarsh_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saltmarsh -d saltmarsh"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: saltmarsh
      DB_USER: saltmarsh
      DB_PASSWORD: saltmarsh
    depends_on:
      db:
        condition: service_healthy

volumes:
  saltmarsh_pg:
